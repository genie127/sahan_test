    <style>
        /* http://meyerweb.com/eric/tools/css/reset/ 
   v2.0 | 20110126
   License: none (public domain)
*/

html, body, div, span, applet, object, iframe,
h1, h2, h3, h4, h5, h6, p, blockquote, pre,
a, abbr, acronym, address, big, cite, code,
del, dfn, em, img, ins, kbd, q, s, samp,
small, strike, strong, sub, sup, tt, var,
b, u, i, center,
dl, dt, dd, ol, ul, li,
fieldset, form, label, legend,
table, caption, tbody, tfoot, thead, tr, th, td,
article, aside, canvas, details, embed, 
figure, figcaption, footer, header, hgroup, 
menu, nav, output, ruby, section, summary,
time, mark, audio, video {
	margin: 0;
	padding: 0;
	border: 0;
	font-size: 100%;
	font: inherit;
	vertical-align: baseline;
}
/* HTML5 display-role reset for older browsers */
article, aside, details, figcaption, figure, 
footer, header, hgroup, menu, nav, section {
	display: block;
}
body {
	line-height: 1;
}
ol, ul {
	list-style: none;
}
blockquote, q {
	quotes: none;
}
blockquote:before, blockquote:after,
q:before, q:after {
	content: '';
	content: none;
}
table {
	border-collapse: collapse;
	border-spacing: 0;
}


    @keyframes comet {
        0%{height: 0;}
        100%{height: 100%;}
    }
    @keyframes fadein {
        0%{opacity:0}
        100%{opacity:1}
    }
    @keyframes blink {
        0%{opacity:0}
        50%{opacity:1}
        100%{opacity:0}
    }

    body{background: #000;}
    *{box-sizing:border-box;}
    * img{width:100%}
    .container_fix{position: relative; padding: 0 20px;}

    .main_wrap .container_fix{position: absolute; top: 0; left: 0; right: 0;}
    .main_wrap{position: relative; width:440px; margin: 0 auto; background: #000; max-width:100%;}
    .main_wrap .bg_comet{position: absolute; left: 0; bottom: 0; right: 0; animation-name: comet; animation-duration: 5s; animation-fill-mode: forwards; height:0; overflow: hidden; }
    .main_wrap .bg_comet.comet2{animation-duration: 8s;}
    .main_wrap .bg_comet img{position: absolute; left: 0; right: 0; bottom: 1px;}
    .main_wrap .star{position: absolute; left: 0; top: 0; right: 0; }
    .main_wrap .star img{position: absolute; left: 0; top: 0; animation-name:blink; animation-duration:2s; animation-iteration-count: infinite;}
    .main_wrap .dot_wrap{position: absolute; left: 0; top: 0; right: 0; bottom: 0;}
    .main_wrap .dot_wrap div[class^="dot"] img{opacity:0; position: absolute; left: 0; bottom: 0; width: 100%; animation-name:fadein; animation-duration:.3s; animation-fill-mode: forwards; animation-iteration-count: 1;}
    
    .nav{position: fixed; bottom: 0; left: 0; right: 0; }
    .nav.main{bottom: 100px; left: 50%; transform:translateX(-50%); width: 700px; max-width:calc(100% - 40px);}
</style>
