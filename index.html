<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        /* http://meyerweb.com/eric/tools/css/reset/ 
   v2.0 | 20110126
   License: none (public domain)
*/

html, body, div, span, applet, object, iframe,
h1, h2, h3, h4, h5, h6, p, blockquote, pre,
a, abbr, acronym, address, big, cite, code,
del, dfn, em, img, ins, kbd, q, s, samp,
small, strike, strong, sub, sup, tt, var,
b, u, i, center,
dl, dt, dd, ol, ul, li,
fieldset, form, label, legend,
table, caption, tbody, tfoot, thead, tr, th, td,
article, aside, canvas, details, embed, 
figure, figcaption, footer, header, hgroup, 
menu, nav, output, ruby, section, summary,
time, mark, audio, video {
	margin: 0;
	padding: 0;
	border: 0;
	font-size: 100%;
	font: inherit;
	vertical-align: baseline;
}
/* HTML5 display-role reset for older browsers */
article, aside, details, figcaption, figure, 
footer, header, hgroup, menu, nav, section {
	display: block;
}
body {
	line-height: 1;
}
ol, ul {
	list-style: none;
}
blockquote, q {
	quotes: none;
}
blockquote:before, blockquote:after,
q:before, q:after {
	content: '';
	content: none;
}
table {
	border-collapse: collapse;
	border-spacing: 0;
}


    @keyframes comet {
        0%{height: 0;}
        100%{height: 100%;}
    }
    @keyframes fadein {
        0%{opacity:0}
        100%{opacity:1}
    }
    @keyframes blink {
        0%{opacity:0}
        50%{opacity:1}
        100%{opacity:0}
    }

    body{background: #000;}
    *{box-sizing:border-box;}
    * img{width:100%}
    .container_fix{position: relative; padding: 0 20px;}
    .delay1{animation-delay:.3s}
    .delay2{animation-delay:.6s}
    .delay3{animation-delay:.9s}
    .delay4{animation-delay:1.2s}

    .main_wrap .container_fix{position: absolute; top: 0; left: 0; right: 0;}
    .main_wrap{position: relative; width:780px; margin: 0 auto; background: #000; max-width:100%;}
    .main_wrap .bg_comet{position: absolute; left: 0; bottom: 0; right: 0; animation-name: comet; animation-duration: 5s; animation-fill-mode: forwards; height:0; overflow: hidden; }
    .main_wrap .bg_comet.comet2{animation-duration: 8s;}
    .main_wrap .bg_comet img{position: absolute; left: 0; right: 0; bottom: 0;}
    .main_wrap .star{position: absolute; left: 0; top: 0; right: 0; }
    .main_wrap .star img{position: absolute; left: 0; top: 0; animation-name:blink; animation-duration:2s; animation-iteration-count: infinite;}
    
    .nav{position: fixed; bottom: 0; left: 0; right: 0; }
    .nav.main{bottom: 100px; left: 50%; transform:translateX(-50%); width: 700px; max-width:calc(100% - 40px);}
</style>
    
    <div class="main_wrap">
        <div class="bg"><img src="img/bg.png" alt=""></div>
        <div class="bg_comet delay2"><img src="img/comet.png" alt=""></div>
        <div class="bg_comet delay3 comet2"><img src="img/comet02.png" alt=""></div>
        <div class="star">
            <img src="img/star01.png" alt="" class="">
            <img src="img/star02.png" alt="" class="delay3">
            <img src="img/star03.png" alt="" class="delay2">
            <img src="img/star04.png" alt="" class="delay1">
            <img src="img/star05.png" alt="" class="delay4">
        </div>
        <div class="dot"></div>
        <div class="container_fix">
            <h1 class="logo">
                sahandkrodn
            </h1>
            <nav class="nav main">
                <ul class="nav_li">
                    <li>sahan</li>
                    <li>message</li>
                    <li>home</li>
                    <li>gru</li>sk
                    <li>settings</li>
                </ul>
            </nav>
        </div>
    </div>

</body>
</html>
